services:
  # Backend API Service
  - type: web
    name: snipurl-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.lightweight
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: snipurl-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: snipurl-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: BASE_URL
        value: https://snipurl-api.onrender.com
      - key: CORS_ORIGINS
        value: '["https://snipurl-frontend.onrender.com"]'
      - key: WEB_CONCURRENCY
        value: 1
    healthCheckPath: /health

  # PostgreSQL Database
  - type: pserv
    name: snipurl-db
    runtime: postgres
    plan: free
    postgresVersion: 16

  # Redis Cache
  - type: redis
    name: snipurl-redis
    plan: free
    ipAllowList: []

  # Frontend Static Site
  - type: web
    name: snipurl-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://snipurl-api.onrender.com
